<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote - NTIC Elections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>

    <div class="card">
        <div class="progress-container">
            <div class="progress-text">
                <span id="pos-name">Position</span>
                <span id="pos-count">Step 1 of 11</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div id="optionsContainer"></div>

        <div class="nav-group">
            <button class="btn-prev" id="prevBtn" onclick="prev()">Previous</button>
            <button class="btn-next" id="nextBtn" onclick="next()">Continue</button>
        </div>
    </div>
</div>

<script>
const positions = {
    "SRC Co-Leader": ["Kubura Mustapha", "Fatima Auwal Adam Sani", "Bilkisu Murtala"],
    "SRC Assist. Co-Leader": ["Rihanna Ahmad Abdulwahab", "Zainab Ismail Mai-Adamu", "Cindy Fechi Ohuruzo"],
    "Well-being Ambassador": ["Mufidah Nababa", "Ameerah Morenike Ibrahim", "Fatima Mai Hamza"],
    "SRC Secretary": ["Bilkisu Dauda Suleiman", "Fatima Mamman Farafara", "Fatima Tsofo", "Amatullah Lawal", "Halima Abdulqadir"],
    "Event Organizer": ["Yesmin Sadiq Bello", "Aisha Musta Ahmad", "Silakasi Nama Joshua", "Safiyta Bello Maiwada"],
    "Sports Captain": ["Favour Enewo Jimoh"],
    "Library Assistant": ["Zainab Mustapha", "Naila Sani", "Khadija Girgir", "Aisha Aliyu Musa"],
    "Hostel Coordinator": ["Asma'u Bala Getso", "Amina Uzairu", "Ummu Salma Kabir Lawal"],
    "Dining Hall Coordinator": ["TBD 1", "TBD 2"],
    "School Ameerah": ["Aisha Bilyameen Gebe", "Amatur-Rahman Abdulqadir"],
    "School Sister": ["TBD 1", "TBD 2"]
};

const keys = Object.keys(positions);
let currentIndex = 0;
let selections = JSON.parse(localStorage.getItem("selections") || "{}");

function updateUI() {
    const currentPos = keys[currentIndex];
    
    // Update Progress
    const percent = ((currentIndex + 1) / keys.length) * 100;
    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("pos-name").innerText = currentPos;
    document.getElementById("pos-count").innerText = `Step ${currentIndex + 1} of ${keys.length}`;

    // Render Options
    let html = "";
    positions[currentPos].forEach(name => {
        const isChecked = (selections[currentPos] === name) ? "checked" : "";
        html += `
        <label class="option">
            <span>${name}</span>
            <input type="radio" name="candidate" value="${name}" ${isChecked} onchange="saveSelection(this)">
        </label>`;
    });
    document.getElementById("optionsContainer").innerHTML = html;

    // Button States
    document.getElementById("prevBtn").disabled = (currentIndex === 0);
    document.getElementById("nextBtn").innerText = (currentIndex === keys.length - 1) ? "Review Ballot" : "Continue";
}

function saveSelection(el) {
    selections[keys[currentIndex]] = el.value;
    localStorage.setItem("selections", JSON.stringify(selections));
}

function next() {
    if (!selections[keys[currentIndex]]) {
        alert("Please select a candidate before continuing.");
        return;
    }
    if (currentIndex < keys.length - 1) {
        currentIndex++;
        updateUI();
    } else {
        window.location.href = "confirm.html";
    }
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        updateUI();
    }
}

updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NTIC Voting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>
    <div class="card">
        <div class="live-badge"><div class="pulse"></div>Election is Live</div>
        <h2>Voter Authentication</h2>
        <div class="input-group">
            <label for="studentId">Student Admission Number</label>
            <input type="text" id="studentId" placeholder="e.g. KAN/2026/123" autocomplete="off" style="text-transform: uppercase;">
            <p id="error" class="error-msg"></p>
        </div>
        <button id="loginBtn" onclick="startVoting()">Verify & Access Ballot</button>
    </div>
    <footer>
        <p>Your vote is 100% anonymous and secure.</p>
        <p>© 2026 NTIC-KANO SRC Elections</p>
    </footer>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec"; // PASTE URL HERE

async function startVoting() {
    const idInput = document.getElementById("studentId");
    const errorDiv = document.getElementById("error");
    const btn = document.getElementById("loginBtn");
    const id = idInput.value.trim().toUpperCase();

    if (!id) {
        errorDiv.innerText = "⚠ ID is required.";
        return;
    }

    btn.innerText = "Verifying...";
    btn.disabled = true;

    try {
        const res = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}`);
        const result = await res.json();

        if (result.valid) {
            localStorage.setItem("currentVoter", id);
            window.location.href = "vote.html";
        } else {
            errorDiv.innerText = "❌ ID not found in eligible list.";
            btn.disabled = false;
            btn.innerText = "Verify & Access Ballot";
        }
    } catch (e) {
        errorDiv.innerText = "⚠ Connection error.";
        btn.disabled = false;
    }
}
</script>
</body>
</html>

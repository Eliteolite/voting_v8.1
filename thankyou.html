<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success - NTIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
<div class="container">
    <div class="card" style="text-align: center; padding: 60px 20px;">
        <h1 style="color: #34d399;">✔ Vote Recorded</h1>
        <p style="margin: 20px 0; color: var(--text-muted);">Your ballot has been securely saved.</p>
        <p style="font-size: 0.9rem;">Redirecting in <span id="timer" style="color: var(--primary); font-weight: bold;">10</span> seconds...</p>
        <button onclick="window.location.href='index.html'" style="margin-top: 20px; width: auto; padding: 10px 30px; background: rgba(255,255,255,0.05);">Logout Now</button>
    </div>
</div>

<script>
function init() {
    launchConfetti(); // Your existing confetti logic
    let seconds = 10;
    const timerEl = document.getElementById("timer");
    
    const interval = setInterval(() => {
        seconds--;
        timerEl.innerText = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = "index.html";
        }
    }, 1000);
}

// ... Paste your launchConfetti() function here ...
</script>
</body>
</html>
